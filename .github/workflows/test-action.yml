name: Test the local action

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test-ubuntu-latest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Test action
        uses: ./

  test-dind-privileged-m:
    runs-on: 'dind-privileged-m'
    container:
      image: ghcr.io/${{ github.repository }}/runner
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Test action
        uses: ./
        with:
          cert-manager-version: "1.17.0"
