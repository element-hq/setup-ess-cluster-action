name: Setup ESS Cluster
description: Setup ESS Cluster
inputs:
  ess-helm-ref:
    description: The ref of the tag or branch to use to install ess-community-integration-tests
    required: true
    default: "main"
  ess-repository:
    description: The repository to install ess-community-integration-tests from
    default: "element-hq/ess-helm"
  fetch-ess-chart:
    description: If true, the chart will be fetched from the repository instead of installed from the local directory
    required: false
    default: "true"
  gh-token:
    description: 'The Github token to use for fetching the chart'
    required: false
runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@6ee6290f1cbc4156c0bdd66691b2c144ef8df19a  # v7.4.0
      with:
        enable-cache: true
        activate-environment: true
        python-version: "3.14"

    - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4  # v4.3.1

    - name: Get current week number and home dir
      id: cache-input
      shell: bash
      run: |
        echo "week=$(date +%Y%U)" | tee -a "$GITHUB_OUTPUT"
        echo "runner-home=$HOME" | tee -a "$GITHUB_OUTPUT"

    - name: Cache ASDF for a week
      id: asdf-cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      env:
        gh_cache_prefix: ${{ runner.os }}-${{ runner.arch }}-asdf-
      with:
        key: ${{ env.gh_cache_prefix }}week-${{ steps.cache-input.outputs.week }}
        path: |
          ${{ steps.cache-input.outputs.runner-home }}/.asdf/bin

    - name: Restore pyhelm cache
      id: cache-pyhelm
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      with:
        path: .pyhelm_cache
        key: pyhelm-integration-cache-week-${{ steps.cache-input.outputs.week }}
        restore-keys: |
          pyhelm-integration-cache-

    - name: List pyhelm cache contents
      shell: bash
      run: |
        echo "Listing contents of .pyhelm_cache:"
        ls -la .pyhelm_cache || echo "Cache directory does not exist or is empty"

    - name: set up ASDF
      uses: asdf-vm/actions/setup@b7bcd026f18772e44fe1026d729e1611cc435d47  # v4.0.1
      with:
        skip_install: ${{ steps.asdf-cache.outputs.cache-hit == 'true' }}

    - name: Write asdf .tool-versions
      id: write-asdf-tools
      env:
        ASDF_TOOLS: "k3d 5.8.3"
      shell: bash
      run: |
        echo "$ASDF_TOOLS" | tee -a ".tool-versions"
        echo "tools-hash=$(sha256sum ".tool-versions" | cut -d ' ' -f 1)" | tee -a "$GITHUB_OUTPUT"

    - name: Restore ASDF tools from cache
      id: asdf-tools-cache
      uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306  # v5.0.3
      env:
        gh_cache_prefix: ${{ runner.os }}-${{ runner.arch }}-asdf-tools-
      with:
        key: ${{ env.gh_cache_prefix }}${{ steps.write-asdf-tools.outputs.tools-hash }}
        path: |
          ${{ env.ASDF_DIR }}/plugins
          ${{ env.ASDF_DIR }}/installs

    - name: Install ASDF tools
      uses: asdf-vm/actions/install@b7bcd026f18772e44fe1026d729e1611cc435d47  # v4.0.1

    - name: Lock .tool-versions globally
      shell: bash
      run: |
        cp .tool-versions "$HOME/.tool-versions"

    - name: Reshim installed ASDF tools
      shell: bash
      run: asdf reshim

    - name: Install ess-helm pytest packege
      shell: bash
      id: install-ess-helm
      env:
        REMOTE_REF: ${{ inputs.ess-helm-ref }}
        REPOSITORY: ${{ inputs.ess-repository }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: |
        # Configure git credentials if gh-token is set
        if [ -n "${GITHUB_TOKEN}" ]; then
          git config --global url."https://x-access-token:${GITHUB_TOKEN}@github.com".insteadOf "https://github.com"
        fi
        output=$(uv tool install git+https://github.com/${REPOSITORY}.git@${REMOTE_REF}#subdirectory=tests 2>&1)
        echo "$output"
        # Extract the line containing the installed executables
        executables_line=$(echo "$output" | grep "Installed [0-9]* executables:")
        # Extract the executable names
        executables=$(echo "$executables_line" | sed 's/Installed [0-9]* executables: //')
        # Find the first executable matching the pattern
        target_executable=$(echo "$executables" | tr ', ' '\n' | grep -E 'setup-ess.*-cluster' | head -n 1)
        echo "setup-ess-cluster-command=${target_executable}" | tee -a "$GITHUB_OUTPUT"
        target_executable=$(echo "$executables" | tr ', ' '\n' | grep -E 'collect-ess.*-logs' | head -n 1)
        echo "collect-ess-command=${target_executable}" | tee -a "$GITHUB_OUTPUT"

    - name: Fetch remote helm chart repository
      shell: bash
      if: ${{ inputs.fetch-ess-chart == 'true' }}
      env:
        REMOTE_REF: ${{ inputs.ess-helm-ref }}
        REPOSITORY: ${{ inputs.ess-repository }}
        GITHUB_TOKEN: ${{ inputs.gh-token }}
      run: |
        if [ -z "$GITHUB_TOKEN" ]; then
          curl -L -o repo.zip "https://github.com/${REPOSITORY}/archive/refs/heads/${REMOTE_REF}.zip"
        else
          curl -L -H "Authorization: Bearer $GITHUB_TOKEN" \
              -o repo.zip "https://api.github.com/repos/${REPOSITORY}/zipball/${REMOTE_REF}"
        fi

        unzip repo.zip
        mkdir -p charts
        # Extract the subdirectory (adjust the wildcard as needed)
        mv *${REPOSITORY##*/}-*/charts/matrix-stack ./charts/matrix-stack
        rm -rf *${REPOSITORY##*/}-* repo.zip
        echo "moved ${REPOSITORY} directory charts/matrix-stack to ./charts/matrix-stack"

    - name: Install ess-helm pytest package
      shell: bash
      env:
        SETUP_CLUSTER_ESS_COMMAND: ${{ steps.install-ess-helm.outputs.setup-ess-cluster-command }}
      run: |
        uv run "$SETUP_CLUSTER_ESS_COMMAND"

        k3d kubeconfig merge ess-helm -ds

    - name: Export logs
      if: ${{ failure() }}
      shell: bash
      env:
        COLLECT_ESS_COMMAND: ${{ steps.install-ess-helm.outputs.collect-ess-command }}
      run: |
        uv run "$COLLECT_ESS_COMMAND" --system-logs

    - name: Upload logs
      if: ${{ failure() }}
      uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f  # v7.0.0
      with:
        name: ess-helm-logs-${{ matrix.test-component }}-${{ matrix.test-from-ref }}
        path: ess-helm-logs
        retention-days: 1
